<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MuseumMatch</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <main class="app">
    <section id="home" class="screen">
      <p class="tag">DMNS Experience Planner</p>
      <h1>MuseumMatch</h1>
      <p class="subtitle">Find your perfect exhibit or IMAX experience.</p>
      <button onclick="startQuiz()">Start Your Match</button>
    </section>

    <section id="quiz" class="screen hidden">
      <div class="progress">
        <div id="progressBar"></div>
      </div>

      <p id="questionNumber"></p>
      <h2 id="questionText"></h2>
      <div id="answerButtons"></div>
    </section>

    <section id="result" class="screen hidden">
      <p class="tag">Your Perfect Match</p>
      <h1 id="matchTitle"></h1>
      <div class="score" id="matchScore"></div>
      <p id="matchDescription"></p>

      <div class="plan">
        <h3>Your Visit Plan</h3>
        <p id="visitPlan"></p>
      </div>

      <button onclick="restart()">Take Quiz Again</button>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
