<!DOCTYPE html>
<html>
<head>
  <title>MuseumMatch</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="hero">
  <h1>MuseumMatch</h1>
  <p>Find your perfect exhibit or IMAX experience.</p>
  <button onclick="startQuiz()">Start Your Match</button>
</div>

<div id="quiz" class="hidden card">
  <h2>What kind of adventure do you want?</h2>
  <button onclick="showResult('space')">🌌 Space & Stars</button>
  <button onclick="showResult('dino')">🦖 Dinosaurs & Fossils</button>
  <button onclick="showResult('gems')">💎 Gems & Minerals</button>
  <button onclick="showResult('animals')">🐾 Animals & Nature</button>
</div>

<div id="result" class="hidden card">
  <h2>Your Museum Match</h2>
  <p id="answer"></p>
  <button onclick="restart()">Try Again</button>
</div>

<script src="script.js"></script>
</body>
</html>
